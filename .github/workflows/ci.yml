name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} debug
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: GCC
            cc: gcc
            cxx: g++
          - compiler: Clang
            cc: clang
            cxx: clang++

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes ninja-build clang clang-tidy

      - name: Configure
        run: cmake --preset debug

      - name: Build
        run: cmake --build --preset debug --parallel 2

      - name: Test
        run: ctest --preset debug

  formatting:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install formatting tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes ninja-build clang-format

      - name: Configure
        run: cmake --preset debug -DENABLE_CLANG_TIDY=OFF

      - name: Check formatting
        run: cmake --build --preset debug --target format-check

  sanitizers:
    name: ${{ matrix.preset }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset: [asan, tsan]

    env:
      CC: clang
      CXX: clang++

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes ninja-build clang

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --parallel 2

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  benchmark-build:
    name: benchmark build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes ninja-build

      - name: Configure
        run: cmake --preset benchmark

      - name: Build
        run: cmake --build --preset benchmark --parallel 2

  network-service:
    name: gRPC server and client
    runs-on: ubuntu-24.04
    env:
      CC: gcc
      CXX: g++

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install gRPC and Protocol Buffers
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            ninja-build \
            protobuf-compiler \
            protobuf-compiler-grpc \
            libprotobuf-dev \
            libgrpc++-dev

      - name: Configure
        run: cmake --preset network-release

      - name: Build
        run: cmake --build --preset network-release --parallel 2

      - name: Test
        run: ctest --preset network-release
