syntax = "proto3";

package nebulakv.v1;

message ErrorDetail {
  string code = 1;
  string message = 2;
  string leader_id = 3;
  string leader_address = 4;
}

message KeyValue {
  bytes key = 1;
  bytes value = 2;
}

message PutRequest {
  bytes key = 1;
  bytes value = 2;
}

message PutResponse {
  bool success = 1;
  uint64 sequence_number = 2;
  ErrorDetail error = 3;
}

message GetRequest {
  bytes key = 1;
}

message GetResponse {
  bool found = 1;
  bytes value = 2;
  ErrorDetail error = 3;
}

message DeleteRequest {
  bytes key = 1;
}

message DeleteResponse {
  bool deleted = 1;
  ErrorDetail error = 2;
}

message BatchPutRequest {
  repeated KeyValue entries = 1;
}

message BatchPutResponse {
  bool success = 1;
  uint32 writes_applied = 2;
  uint64 last_sequence_number = 3;
  ErrorDetail error = 4;
}

message StatusRequest {}

message StatusResponse {
  bool ready = 1;
  uint64 live_keys = 2;
  uint64 last_sequence_number = 3;
  uint64 level0_sstables = 4;
  uint64 level1_sstables = 5;
  uint64 cache_hits = 6;
  uint64 cache_misses = 7;
  uint64 cache_evictions = 8;
  double cache_hit_ratio = 9;
  uint64 compactions_completed = 10;
  uint64 queued_requests = 11;
  uint64 active_requests = 12;
  uint64 rejected_requests = 13;
  uint64 requests_total = 14;
  uint64 failed_requests_total = 15;
  string node_id = 16;
  string raft_role = 17;
  uint64 raft_term = 18;
  string leader_id = 19;
  string leader_address = 20;
  uint64 raft_commit_index = 21;
  uint64 raft_last_applied = 22;
  uint64 raft_last_log_index = 23;
  uint64 raft_snapshot_index = 24;
  uint64 raft_elections_total = 25;
  uint64 raft_replication_failures_total = 26;
  uint64 raft_snapshots_created_total = 27;
  uint64 raft_snapshots_installed_total = 28;
}

message RaftCommand {
  enum Type {
    NOOP = 0;
    PUT = 1;
    DELETE = 2;
  }
  Type type = 1;
  bytes key = 2;
  bytes value = 3;
}

message RaftLogEntry {
  uint64 index = 1;
  uint64 term = 2;
  RaftCommand command = 3;
}

message RequestVoteRequest {
  uint64 term = 1;
  string candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

message AppendEntriesRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 previous_log_index = 3;
  uint64 previous_log_term = 4;
  repeated RaftLogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 match_index = 3;
  uint64 conflict_index = 4;
}

message InstallSnapshotRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term = 4;
  bytes payload = 5;
}

message InstallSnapshotResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 installed_index = 3;
}

service KeyValueService {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc BatchPut(BatchPutRequest) returns (BatchPutResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
}

service RaftService {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}
