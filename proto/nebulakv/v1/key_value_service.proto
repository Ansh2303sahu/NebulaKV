syntax = "proto3";

package nebulakv.v1;

message ErrorDetail {
  string code = 1;
  string message = 2;
}

message KeyValue {
  bytes key = 1;
  bytes value = 2;
}

message PutRequest {
  bytes key = 1;
  bytes value = 2;
}

message PutResponse {
  bool success = 1;
  uint64 sequence_number = 2;
  ErrorDetail error = 3;
}

message GetRequest {
  bytes key = 1;
}

message GetResponse {
  bool found = 1;
  bytes value = 2;
  ErrorDetail error = 3;
}

message DeleteRequest {
  bytes key = 1;
}

message DeleteResponse {
  bool deleted = 1;
  ErrorDetail error = 2;
}

message BatchPutRequest {
  repeated KeyValue entries = 1;
}

message BatchPutResponse {
  bool success = 1;
  uint32 writes_applied = 2;
  uint64 last_sequence_number = 3;
  ErrorDetail error = 4;
}

message StatusRequest {}

message StatusResponse {
  bool ready = 1;
  uint64 live_keys = 2;
  uint64 last_sequence_number = 3;
  uint64 level0_sstables = 4;
  uint64 level1_sstables = 5;
  uint64 cache_hits = 6;
  uint64 cache_misses = 7;
  uint64 cache_evictions = 8;
  double cache_hit_ratio = 9;
  uint64 compactions_completed = 10;
  uint64 queued_requests = 11;
  uint64 active_requests = 12;
  uint64 rejected_requests = 13;
  uint64 requests_total = 14;
  uint64 failed_requests_total = 15;
}

service KeyValueService {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc BatchPut(BatchPutRequest) returns (BatchPutResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
}
